<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>sports-trends</title>

    <!-- installable as a standalone app: no address bar / browser chrome once added to home screen -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A0B0F" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "black-translucent" (light icons, transparent bar) matches this app's
         near-black dark theme; "default" would render dark icons over dark
         content with no contrast -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MLB Trends" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
